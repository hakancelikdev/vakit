<script>
(function() {
  var lang = localStorage.getItem('preferredLanguage') || 'tr';
  var content = {
    tr: {
      title: 'Gizlilik <em>Politikası</em>',
      desc: 'Vakit gizliliğinize saygı duyar. Yalnızca namaz vakitlerini hesaplamak, kıble yönünü belirlemek, yerel hatırlatıcılar göndermek ve uygulama performansını iyileştirmek için gerekli verileri toplarız. Toplanan verilerin çoğu cihazınızda kalır; yalnızca anonim analitik veriler uygulama geliştirme ve iyileştirme amacıyla güvenli sunuculara gönderilir.',
      sections: [
        { t: '1. Topladığımız Veriler', b: 'İsminizi, e-posta adresinizi, fotoğraflarınızı, mikrofonunuzu, kameranızı, rehberinizi veya herhangi bir kişisel tanımlayıcı bilgiyi toplamayız.\n\nAnonim analitik veriler yalnızca uygulama geliştirme amacıyla toplanır ve şunları içerir:\n\u2022 Bölgesel konum bilgisi (ülke, şehir, ilçe) \u2013 GPS koordinatları (enlem/boylam) toplanmaz\n\u2022 Cihaz bilgisi (model, işletim sistemi sürümü, uygulama sürümü)\n\u2022 Uygulama tercihleri (dil, hesaplama yöntemi, tema)\n\u2022 Özellik kullanım istatistikleri (zikir sayısı, ekran görüntülenme süreleri)\n\nToplanmayan veriler:\n\u2022 GPS koordinatları (enlem/boylam)\n\u2022 Zikir içerikleri veya özel zikir isimleri\n\u2022 Arama sorgusu metinleri\n\u2022 Kişisel ibadet detayları' },
        { t: '2. Verilerinizi Nasıl Kullanıyoruz', b: '\u2022 Namaz Vakti Hesaplama \u2013 Konum cihazınızda yerel olarak işlenir.\n\u2022 Kıble Yönü \u2013 Konum ve yön bilgisi cihaz üzerinde birleştirilir.\n\u2022 İbadet Hatırlatıcıları \u2013 Yerel bildirimler planlanır.\n\u2022 Kullanıcı Tercihleri \u2013 Yerel olarak saklanır.\n\u2022 Analitik ve İyileştirme \u2013 Anonim kullanım verileri uygulama performansını izlemek, hataları tespit etmek ve kullanıcı deneyimini iyileştirmek amacıyla güvenli sunuculara gönderilir.' },
        { t: '3. Veri Paylaşımı & Üçüncü Taraflar', b: 'Verilerinizi hiç kimseyle paylaşmıyor, satmıyor veya aktarmıyoruz. Anonim analitik veriler uygulama geliştirme ve iyileştirme amacıyla güvenli veritabanında saklanır. Bu veriler kişisel olarak tanımlanamaz, hiç kimseyle paylaşılmaz ve yalnızca toplu istatistiksel analizler için kullanılır.' },
        { t: '4. Güvenlik', b: 'Tüm yerel veriler iPhone\'unuzda kalır ve iOS sandbox\'ı ile şifreleme tarafından korunur. Analitik veriler güvenli veritabanında şifrelenmiş olarak saklanır ve yalnızca anonim istatistiksel analizler için kullanılır. Veriler hiç kimseyle paylaşılmaz. Kişisel tanımlayıcı bilgiler toplanmaz veya saklanmaz.' }
      ],
      nav: { features: 'Özellikler', trust: 'Emanet', faq: 'SSS', download: 'İndir' }
    },
    en: {
      title: 'Privacy <em>Policy</em>',
      desc: 'Vakit respects your privacy. We only collect the data necessary to calculate prayer times, determine qibla direction, send local notifications, and improve app performance. Most collected data remains on your device; only anonymous analytics data is sent to secure servers for app development and improvement purposes.',
      sections: [
        { t: '1. Data We Collect', b: 'We do not collect your name, email, photos, microphone, camera, contacts, or any personally identifiable information.\n\nAnonymous analytics data collected for app development includes:\n\u2022 Regional location (country, city) \u2013 GPS coordinates (lat/lon) are not collected\n\u2022 Device info (model, OS version, app version)\n\u2022 App preferences (language, calculation method, theme)\n\u2022 Feature usage statistics (dhikr count, screen view durations)\n\nData NOT collected:\n\u2022 GPS coordinates (latitude/longitude)\n\u2022 Dhikr contents or custom dhikr names\n\u2022 Search query texts\n\u2022 Personal worship details' },
        { t: '2. How We Use Your Data', b: '\u2022 Prayer Time Calculation \u2013 Location is processed locally on your device.\n\u2022 Qibla Direction \u2013 Location and heading are combined on-device.\n\u2022 Worship Reminders \u2013 Local notifications are scheduled.\n\u2022 User Preferences \u2013 Stored locally.\n\u2022 Analytics & Improvement \u2013 Anonymous usage data is sent to secure servers to monitor performance, detect bugs, and improve user experience.' },
        { t: '3. Data Sharing & Third Parties', b: 'We do not share, sell, or transfer your data to anyone. Anonymous analytics data is stored in a secure database for app development. This data cannot be personally identified, is not shared with anyone, and is used only for aggregate statistical analysis.' },
        { t: '4. Security', b: 'All local data stays on your iPhone, protected by iOS sandbox and encryption. Analytics data is stored encrypted in a secure database and used only for anonymous statistical analysis. Data is not shared with anyone. No personally identifiable information is collected or stored.' }
      ],
      nav: { features: 'Features', trust: 'Trust', faq: 'FAQ', download: 'Download' }
    }
  };
  var c = content[lang] || content.tr;
  document.getElementById('legalTitle').innerHTML = c.title;
  document.getElementById('legalDesc').textContent = c.desc;
  var html = c.sections.map(function(s) {
    return '<div class="legal-card"><h3>' + s.t + '</h3><p>' + s.b + '</p></div>';
  }).join('');
  document.getElementById('legalSections').innerHTML = html;
  document.documentElement.lang = lang;
  // Nav labels
  var links = document.querySelectorAll('.nav-links a');
  links[0].textContent = c.nav.features;
  links[1].textContent = c.nav.trust;
  links[2].textContent = c.nav.faq;
  document.querySelector('.nav-dl').textContent = c.nav.download;
  // Lang toggle
  document.querySelectorAll('.nav-lang button').forEach(function(b) {
    b.classList.toggle('on', b.dataset.lang === lang);
    b.addEventListener('click', function() {
      localStorage.setItem('preferredLanguage', b.dataset.lang);
      location.reload();
    });
  });
  // Mobile menu
  var toggle = document.querySelector('.nav-toggle');
  var navLinks = document.querySelector('.nav-links');
  if (toggle) toggle.addEventListener('click', function() {
    navLinks.classList.toggle('open');
    toggle.textContent = navLinks.classList.contains('open') ? '\u00D7' : '\u2261';
  });
})();
