<script>
(function() {
  var lang = localStorage.getItem('preferredLanguage') || 'tr';
  var content = {
    tr: {
      title: 'Kullanım <em>Şartları</em>',
      desc: 'Uygulamamızı indirerek, yükleyerek veya kullanarak bu Şartlara bağlı kalmayı kabul edersiniz. Lütfen bu Şartları dikkatle okuyun.',
      sections: [
        { t: '1. Şartların Kabulü', b: 'Vakit\'e erişerek ve kullanarak, bu anlaşmanın şart ve hükümlerine bağlı kalmayı kabul edersiniz. Kabul etmiyorsanız, lütfen bu hizmeti kullanmayın.' },
        { t: '2. Ücretsiz Kullanım', b: 'Vakit tamamen ücretsizdir. Tüm özellikler herkes için ücretsiz olarak sunulmaktadır. Gelecekte ücretli özellikler eklenirse, bunlar açıkça belirtilecektir.' },
        { t: '3. Kullanıcı Sorumlulukları', b: 'Sorumlu olduğunuz konular: Doğru konum bilgisi sağlamak, yasalara uygun şekilde kullanmak ve uygulamaya zarar vermemektir.' },
        { t: '4. Sorumluluk Sınırlaması', b: 'Uygulama "olduğu gibi" sunulmaktadır. Namaz vakitleri ve kıble yönü hesaplamaları doğru olmaya çalışılır ancak kesin doğruluk garanti edilmez.' }
      ],
      nav: { features: 'Özellikler', trust: 'Emanet', faq: 'SSS', download: 'İndir' }
    },
    en: {
      title: 'Terms of <em>Use</em>',
      desc: 'By downloading, installing, or using our App, you agree to be bound by these Terms. Please read these Terms carefully.',
      sections: [
        { t: '1. Acceptance of Terms', b: 'By accessing and using Vakit, you agree to be bound by the terms and conditions of this agreement. If you do not agree, please do not use this service.' },
        { t: '2. Free Usage', b: 'Vakit is completely free. All features are offered free of charge for everyone. If paid features are added in the future, they will be clearly indicated.' },
        { t: '3. User Responsibilities', b: 'You are responsible for: providing accurate location information, using the app in compliance with laws, and not causing harm to the application.' },
        { t: '4. Limitation of Liability', b: 'The application is provided "as is." Prayer times and qibla direction calculations strive to be accurate but absolute accuracy is not guaranteed.' }
      ],
      nav: { features: 'Features', trust: 'Trust', faq: 'FAQ', download: 'Download' }
    }
  };
  var c = content[lang] || content.tr;
  document.getElementById('legalTitle').innerHTML = c.title;
  document.getElementById('legalDesc').textContent = c.desc;
  var html = c.sections.map(function(s) {
    return '<div class="legal-card"><h3>' + s.t + '</h3><p>' + s.b + '</p></div>';
  }).join('');
  document.getElementById('legalSections').innerHTML = html;
  document.documentElement.lang = lang;
  var links = document.querySelectorAll('.nav-links a');
  links[0].textContent = c.nav.features;
  links[1].textContent = c.nav.trust;
  links[2].textContent = c.nav.faq;
  document.querySelector('.nav-dl').textContent = c.nav.download;
  document.querySelectorAll('.nav-lang button').forEach(function(b) {
    b.classList.toggle('on', b.dataset.lang === lang);
    b.addEventListener('click', function() {
      localStorage.setItem('preferredLanguage', b.dataset.lang);
      location.reload();
    });
  });
  var toggle = document.querySelector('.nav-toggle');
  var navLinks = document.querySelector('.nav-links');
  if (toggle) toggle.addEventListener('click', function() {
    navLinks.classList.toggle('open');
    toggle.textContent = navLinks.classList.contains('open') ? '\u00D7' : '\u2261';
  });
})();
</script>
